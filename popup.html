<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClawSnap</title>
  <style>
    :root {
      --primary: #4f46e5;
      --on-primary: #ffffff;
      --primary-container: #e0e7ff;
      --on-primary-container: #1e1b4b;
      --surface: #f8f9ff;
      --surface-container: #eef1ff;
      --surface-container-high: #e4e8fb;
      --on-surface: #1b1b21;
      --on-surface-variant: #525462;
      --outline: #c5c7d8;
      --error: #b3261e;
      --shadow: 0 1px 2px rgba(16, 24, 40, .08), 0 8px 24px rgba(16, 24, 40, .08);
      --radius-xl: 22px;
      --radius-pill: 999px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 380px;
      min-height: 560px;
      font-family: Roboto, "Noto Sans SC", "PingFang SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--surface);
      color: var(--on-surface);
      -webkit-font-smoothing: antialiased;
    }
    .app { padding: 14px; display: flex; flex-direction: column; gap: 12px; }
    .top-bar {
      min-height: 56px; border-radius: var(--radius-xl); background: var(--surface-container);
      box-shadow: var(--shadow); display: flex; align-items: center; justify-content: space-between; padding: 0 14px;
    }
    .title-wrap h1 { margin: 0; font-size: 16px; font-weight: 700; }
    .title-wrap p { margin: 3px 0 0; font-size: 12px; color: var(--on-surface-variant); }
    .chip {
      min-height: 32px; padding: 6px 10px; border-radius: var(--radius-pill); font-size: 11px;
      font-weight: 600; background: var(--primary-container); color: var(--on-primary-container);
    }
    .panel { background: white; border-radius: var(--radius-xl); box-shadow: var(--shadow); overflow: hidden; }
    .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; background: var(--surface-container); }
    .tab-btn {
      min-height: 44px; border: 0; border-radius: var(--radius-pill); cursor: pointer;
      font-size: 13px; font-weight: 600; color: var(--on-surface-variant); background: transparent; transition: all .2s ease;
    }
    .tab-btn.active { background: var(--primary-container); color: var(--on-primary-container); }
    .tab-content { display: none; padding: 14px; }
    .tab-content.active { display: block; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: var(--on-surface-variant); margin-bottom: 6px; }
    input, textarea, select {
      width: 100%; border: 1px solid var(--outline); border-radius: 14px; background: #fff; color: var(--on-surface);
      padding: 12px; font-size: 13px; transition: border-color .2s ease, box-shadow .2s ease; outline: none;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, .18); }
    textarea { min-height: 74px; resize: vertical; }
    .hint { margin-top: 6px; font-size: 11px; color: var(--on-surface-variant); line-height: 1.45; }
    .token-box {
      margin-top: 6px; background: var(--surface-container); border-radius: 12px; padding: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; color: #303244;
    }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    button { min-height: 48px; border: 0; border-radius: var(--radius-pill); cursor: pointer; font-size: 13px; font-weight: 700; }
    button:active { transform: scale(.98); }
    button:disabled { opacity: .65; cursor: not-allowed; }
    .btn-secondary { background: var(--surface-container-high); color: var(--on-surface); }
    .btn-primary { background: var(--primary); color: var(--on-primary); box-shadow: 0 8px 16px rgba(79, 70, 229, .25); }
    .status {
      min-height: 38px; padding: 10px 12px; border-radius: 12px; font-size: 12px; line-height: 1.45;
      background: var(--surface-container); color: var(--on-surface-variant); white-space: pre-wrap;
    }
    .status.ok { background: #e7f8ef; color: #165b39; }
    .status.error { background: #fdecea; color: var(--error); }
  </style>
</head>
<body>
  <main class="app">
    <header class="top-bar">
      <div class="title-wrap">
        <h1>ClawSnap</h1>
        <p>捕获页面并自动投递到目标机器人会话</p>
      </div>
      <span class="chip">M3 UI</span>
    </header>

    <section class="panel">
      <div class="tabs">
        <button id="tabConfigBtn" class="tab-btn active" type="button">连接配置</button>
        <button id="tabTemplateBtn" class="tab-btn" type="button">分析模板</button>
      </div>

      <div id="tabConfig" class="tab-content active">
        <div class="field">
          <label for="botToken">中转 Bot Token</label>
          <input id="botToken" type="password" placeholder="123456:ABC..." />
          <div class="hint">负责把截图和分析请求投递到目标会话。</div>
        </div>
        <div class="field">
          <label for="chatId">目标 Chat ID（Claw 在的群/频道）</label>
          <input id="chatId" type="text" placeholder="例如 -100xxxx" />
          <div class="hint">必须填目标机器人所在群/频道 ID（通常 -100 开头）。</div>
        </div>

        <div class="field">
          <label for="targetBot">目标机器人用户名（必填）</label>
          <input id="targetBot" type="text" placeholder="例如 @claw_bot" />
          <div class="hint">发送时会自动 @该机器人，请确保它和中转 bot 在同一群/频道。</div>
        </div>
        <div class="field">
          <label for="clawMention">额外唤起前缀（可选）</label>
          <input id="clawMention" type="text" placeholder="例如 @your_claw_bot" />
        </div>
        <div class="field">
          <label for="note">备注（可选）</label>
          <textarea id="note" placeholder="例如：请重点提取这页的待办和风险"></textarea>
        </div>
      </div>

      <div id="tabTemplate" class="tab-content">
        <div class="field">
          <label for="templatePreset">分析模板预设</label>
          <select id="templatePreset">
            <option value="summary">总结重点</option>
            <option value="todo">提取待办</option>
            <option value="risk">风险评估</option>
            <option value="custom">自定义</option>
          </select>
        </div>
        <div class="field">
          <label for="analysisTemplate">分析指令模板</label>
          <textarea id="analysisTemplate" style="min-height: 170px"></textarea>
          <div class="hint">支持变量：</div>
          <div class="token-box">{{timestamp}} {{domain}} {{url}} {{title}} {{note}} {{snippet}}</div>
        </div>
      </div>
    </section>

    <div class="actions">
      <button id="saveBtn" class="btn-secondary" type="button">保存配置</button>
      <button id="sendBtn" class="btn-primary" type="button">捕获并发送</button>
    </div>

    <div id="status" class="status">准备就绪</div>
  </main>

  <script src="popup.js"></script>
  <script>
    (() => {
      const tabConfigBtn = document.getElementById('tabConfigBtn');
      const tabTemplateBtn = document.getElementById('tabTemplateBtn');
      const tabConfig = document.getElementById('tabConfig');
      const tabTemplate = document.getElementById('tabTemplate');
      const status = document.getElementById('status');

      function setTab(target) {
        const isConfig = target === 'config';
        tabConfigBtn.classList.toggle('active', isConfig);
        tabTemplateBtn.classList.toggle('active', !isConfig);
        tabConfig.classList.toggle('active', isConfig);
        tabTemplate.classList.toggle('active', !isConfig);
      }

      tabConfigBtn.addEventListener('click', () => setTab('config'));
      tabTemplateBtn.addEventListener('click', () => setTab('template'));

      const observer = new MutationObserver(() => {
        const text = status.textContent || '';
        status.classList.remove('ok', 'error');
        if (text.includes('成功') || text.includes('已保存')) status.classList.add('ok');
        if (text.includes('失败') || text.includes('错误') || text.includes('请先')) status.classList.add('error');
      });
      observer.observe(status, { childList: true, characterData: true, subtree: true });
    })();
  </script>
</body>
</html>
